<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    function ChatInput({ChatMessages, setChatMessages}){
          const [inputtxt, setinputtxt] = React.useState('')
          function savetext(event){
            setinputtxt(event.target.value)
          }
          function send(){
            const newchat = [
              ...ChatMessages,
              {
                message: inputtxt,
                sender: 'user',
                id: crypto.randomUUID()
              }
            ]
            setChatMessages (newchat)
            let response =  Chatbot.getResponse(inputtxt)
            setChatMessages ([
              ...newchat,
              {
                message: response,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ])
            setinputtxt('')
          }
           return(
            <div className = "inp">
                <input id = "input" placeholder = "Send a message to chatbot" size = "30" onChange = {savetext} value = {inputtxt} />
                
                <button id = "send" onClick = {send}> send </button>
                
            </div>
           )
        }
      function ChatMessage(props) {
            const { message, sender} = props;
            return (
            <div className={sender === "user" ? "chat-user": "chat-robot"}>
            {sender === "robot" && <img src = "robot.png" className= "profile" /> }
            <div className='msg'>
            {message}
            </div>
            {sender === "user" && <img src = "user.png" className= "profile" /> }         
            </div>
            )
        }
      function Chat({ChatMessages}){
          const characterref = React.useRef
          (null);
          React.useEffect (() => {
            const element = characterref.current;
            if(element){
              element.scrollTop = element.scrollHeight;
            }
          },[characterref])
          return(
          <div className = "chat-container" ref= {characterref}>
            {ChatMessages.map((chatmessage) =>(
                    <ChatMessage 
                      message = {chatmessage.message}
                      sender = {chatmessage.sender}
                      key = {chatmessage.id}
                    />
                  
            ))}
            </div>
          )

        }    
      function App(){
        let [ChatMessages, setChatMessages] = React.useState(
            [{
            message: 'hello chatbot', 
            sender: 'user',
            id: 'id1'
            },{
            message:'Hello! How can I help you?', 
            sender: 'robot',
            id: 'id2'
            },{
            message: 'can u get me today date', 
            sender: 'user',
            id: 'id3'
            },{
            message: 'Today is February 20',
            sender: 'robot',
            id: 'id4'
            }
            ]
          )

          return(
          <div className="chat" >
            <Chat ChatMessages={ChatMessages} />
            <ChatInput  
              ChatMessages={ChatMessages} 
              setChatMessages={setChatMessages} 
            />
          </div>
          )
          
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>)
    </script>
  </body>
</html>
